<!-- ========== ADDITIVE FIX: Save Products Directly to Google Drive CSV Files ========== -->
<script>
(function fixGoogleDriveProductSave() {
    // Wait for Google token and product data
    var checkInterval = setInterval(function() {
        if (typeof accessToken !== 'undefined' && accessToken && 
            typeof currentProdList !== 'undefined' && 
            typeof currentProdHeaders !== 'undefined') {
            clearInterval(checkInterval);
            
            // Your Google Drive file IDs for CSV files
            const GOOGLE_DRIVE_COFFEE_FILE_ID = '1qE8UXyMXkx-A-TbirZaqgBUMMSUw-vxs';
            const GOOGLE_DRIVE_WATER_FILE_ID = '13wQBhl-izIADfyHUpMeBYdF9DnvAxslX';
            
            // Function to save products to Google Drive CSV
            window.saveProductsToGoogleDrive = async function(fileName, productList, headers) {
                if (!accessToken) {
                    showToast('Please sign in with Google first', true);
                    return false;
                }
                
                try {
                    // Determine which file ID to use
                    var fileId = null;
                    if (fileName === 'Coffee.csv') {
                        fileId = GOOGLE_DRIVE_COFFEE_FILE_ID;
                    } else if (fileName === 'Water.csv') {
                        fileId = GOOGLE_DRIVE_WATER_FILE_ID;
                    } else {
                        showToast('Unknown product file', true);
                        return false;
                    }
                    
                    // Build CSV content
                    var visibleHeaders = headers.filter(function(h) { return h !== 'Status'; });
                    var csvRows = [];
                    csvRows.push(visibleHeaders.join(','));
                    
                    for (var p = 0; p < productList.length; p++) {
                        var product = productList[p];
                        var row = [];
                        for (var v = 0; v < visibleHeaders.length; v++) {
                            var headerName = visibleHeaders[v];
                            var val = product[headerName] || '';
                            // Escape commas with quotes
                            if (val.indexOf(',') !== -1 || val.indexOf('"') !== -1) {
                                val = '"' + val.replace(/"/g, '""') + '"';
                            }
                            row.push(val);
                        }
                        csvRows.push(row.join(','));
                    }
                    
                    var csvContent = csvRows.join('\n');
                    
                    // First, get the current file metadata to check if it exists
                    var getResponse = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId, {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + accessToken
                        }
                    });
                    
                    if (!getResponse.ok) {
                        throw new Error('File not found or access denied');
                    }
                    
                    // Upload the new content using multipart update
                    var boundary = '-------' + Date.now();
                    var metadata = {
                        name: fileName,
                        mimeType: 'text/csv'
                    };
                    
                    var multipart = '--' + boundary + '\r\n' +
                        'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                        JSON.stringify(metadata) + '\r\n' +
                        '--' + boundary + '\r\n' +
                        'Content-Type: text/csv\r\n' +
                        'Content-Transfer-Encoding: base64\r\n\r\n' +
                        btoa(unescape(encodeURIComponent(csvContent))) + '\r\n' +
                        '--' + boundary + '--';
                    
                    var updateResponse = await fetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=multipart', {
                        method: 'PATCH',
                        headers: {
                            'Authorization': 'Bearer ' + accessToken,
                            'Content-Type': 'multipart/related; boundary=' + boundary
                        },
                        body: multipart
                    });
                    
                    if (updateResponse.ok) {
                        showToast('Products saved to Google Drive: ' + fileName, false);
                        return true;
                    } else {
                        var error = await updateResponse.json();
                        console.error('Drive update error:', error);
                        showToast('Failed to save to Google Drive: ' + (error.error ? error.error.message : 'Unknown error'), true);
                        return false;
                    }
                } catch (err) {
                    console.error('Save to Drive error:', err);
                    showToast('Error saving to Google Drive: ' + err.message, true);
                    return false;
                }
            };
            
            // Function to load products from Google Drive CSV (with cache bypass)
            window.loadProductsFromGoogleDrive = async function(fileName) {
                if (!accessToken) {
                    return false;
                }
                
                try {
                    var fileId = null;
                    if (fileName === 'Coffee.csv') {
                        fileId = GOOGLE_DRIVE_COFFEE_FILE_ID;
                    } else if (fileName === 'Water.csv') {
                        fileId = GOOGLE_DRIVE_WATER_FILE_ID;
                    } else {
                        return false;
                    }
                    
                    // Export file as text
                    var exportUrl = 'https://www.googleapis.com/drive/v3/files/' + fileId + '/export?mimeType=text%2Fplain';
                    var response = await fetch(exportUrl, {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + accessToken
                        }
                    });
                    
                    if (response.ok) {
                        var csvText = await response.text();
                        var lines = csvText.split('\n').filter(function(l) { return l.trim(); });
                        if (lines.length > 0) {
                            var headers = lines[0].split(',').map(function(h) { return h.trim(); }).filter(function(h) { return h !== ''; });
                            if (headers.indexOf('Status') === -1) headers.push('Status');
                            
                            var products = [];
                            for (var i = 1; i < lines.length; i++) {
                                var vals = lines[i].split(',');
                                var pObj = {};
                                for (var j = 0; j < headers.length; j++) {
                                    var header = headers[j];
                                    if (header !== 'Status') {
                                        pObj[header] = (vals[j] || '').trim().replace(/^"|"$/g, '');
                                    }
                                }
                                pObj.Status = pObj.Status || 'Active';
                                var firstHeader = headers[0];
                                if (pObj[firstHeader] && pObj[firstHeader].toLowerCase() !== 'not delivered' && pObj[firstHeader] !== '') {
                                    products.push(pObj);
                                }
                            }
                            
                            currentProdHeaders = headers;
                            currentProdList = products;
                            currentProductFile = fileName;
                            renderProdTable();
                            showToast('Products loaded from Google Drive', false);
                            return true;
                        }
                    }
                    return false;
                } catch (err) {
                    console.error('Load from Drive error:', err);
                    return false;
                }
            };
            
            // Override saveProductEdit to save to Google Drive AND localStorage
            var originalSaveEdit = window.saveProductEdit;
            window.saveProductEdit = function() {
                if (currentEditingProductIndex === -1) {
                    alert('No product selected');
                    return;
                }
                
                // Update the product data
                for (var i = 0; i < currentProdHeaders.length; i++) {
                    var header = currentProdHeaders[i];
                    if (header === 'Status') continue;
                    var input = document.getElementById('product_edit_' + header.replace(/ /g, '_'));
                    if (input) currentProdList[currentEditingProductIndex][header] = input.value;
                }
                
                renderProdTable();
                closeProductEditModal();
                
                // Save to Google Drive
                window.saveProductsToGoogleDrive(currentProductFile, currentProdList, currentProdHeaders);
                
                // Also save to localStorage as backup
                var backupData = {
                    headers: currentProdHeaders,
                    products: currentProdList,
                    file: currentProductFile,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('logiflow_products_' + currentProductFile, JSON.stringify(backupData));
                
                showToast('Saving product changes to Google Drive...', false);
            };
            
            // Override toggleProductStatus to save to Google Drive
            var originalToggleStatus = window.toggleProductStatus;
            window.toggleProductStatus = function(idx) {
                currentProdList[idx].Status = (currentProdList[idx].Status === 'Active') ? 'Deactivated' : 'Active';
                renderProdTable();
                window.saveProductsToGoogleDrive(currentProductFile, currentProdList, currentProdHeaders);
            };
            
            // Override loadProductFile to try Google Drive first, then GitHub
            var originalLoadFile = window.loadProductFile;
            window.loadProductFile = async function(fileName) {
                currentProductFile = fileName;
                var tbody = document.getElementById('prodTableBody');
                var theadRow = document.getElementById('prodTableHead');
                tbody.innerHTML = '<tr><td colspan="10">Loading products from Google Drive...</div>';
                
                // Try Google Drive first
                var driveLoaded = await window.loadProductsFromGoogleDrive(fileName);
                if (driveLoaded) {
                    return;
                }
                
                // Fallback to GitHub
                tbody.innerHTML = '<tr><td colspan="10">Loading products from GitHub...</div>';
                var text = await fetchFromGitHub('Products/' + fileName);
                if (!text) {
                    tbody.innerHTML = '<tr><td colspan="10">Unable to load products.</div>';
                    showToast('Error loading products', true);
                    return;
                }
                
                var lines = text.split('\n').filter(function(l) { return l.trim(); });
                if (lines.length > 0) {
                    currentProdHeaders = lines[0].split(',').map(function(h) { return h.trim(); }).filter(function(h) { return h !== ''; });
                    if (currentProdHeaders.indexOf('Status') === -1) currentProdHeaders.push('Status');
                    
                    var headerHtml = '<th>Action</th>';
                    for (var h = 0; h < currentProdHeaders.length; h++) {
                        headerHtml += '<th>' + currentProdHeaders[h] + '</th>';
                    }
                    theadRow.innerHTML = headerHtml;
                    
                    currentProdList = [];
                    for (var i = 1; i < lines.length; i++) {
                        var vals = lines[i].split(',');
                        var pObj = {};
                        for (var j = 0; j < currentProdHeaders.length; j++) {
                            var header = currentProdHeaders[j];
                            if (header !== 'Status') {
                                pObj[header] = (vals[j] || '').trim();
                            }
                        }
                        pObj.Status = pObj.Status || 'Active';
                        var firstHeader = currentProdHeaders[0];
                        if (pObj[firstHeader] && pObj[firstHeader].toLowerCase() !== 'not delivered' && pObj[firstHeader] !== '') {
                            currentProdList.push(pObj);
                        }
                    }
                    
                    renderProdTable();
                    showToast('Products loaded from GitHub', false);
                    
                    // Also save the GitHub version to Google Drive as initial backup
                    window.saveProductsToGoogleDrive(fileName, currentProdList, currentProdHeaders);
                }
            };
            
            console.log('Google Drive product save fix applied - products save directly to Google Drive CSV files');
        }
    }, 1000);
})();
</script>
<!-- ========== END OF ADDITIVE FIX ========== -->

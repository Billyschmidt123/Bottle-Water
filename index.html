<!-- ========== ADDITIVE FIX: Simple Product Persistence with LocalStorage + Google Drive Export ========== -->
<script>
(function fixProductPersistence() {
    // Wait for product data to be available
    var checkInterval = setInterval(function() {
        if (typeof currentProdList !== 'undefined' && typeof currentProdHeaders !== 'undefined' && typeof renderProdTable !== 'undefined') {
            clearInterval(checkInterval);
            
            // ========== LOCAL STORAGE SAVE/LOAD (Auto-saves, always works) ==========
            function saveProductsToLocalStorage() {
                if (!currentProductFile) return;
                var data = {
                    headers: currentProdHeaders,
                    products: currentProdList,
                    file: currentProductFile,
                    version: '1.0',
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('logiflow_products_' + currentProductFile, JSON.stringify(data));
                console.log('Auto-saved to localStorage:', currentProductFile);
                return true;
            }
            
            function loadProductsFromLocalStorage(fileName) {
                var saved = localStorage.getItem('logiflow_products_' + fileName);
                if (saved) {
                    try {
                        var data = JSON.parse(saved);
                        if (data.products && data.products.length > 0 && data.headers) {
                            currentProdHeaders = data.headers;
                            currentProdList = data.products;
                            currentProductFile = data.file;
                            renderProdTable();
                            showToast('Loaded from browser storage', false);
                            return true;
                        }
                    } catch(e) {
                        console.error('LocalStorage parse error:', e);
                    }
                }
                return false;
            }
            
            // ========== EXPORT TO GOOGLE DRIVE (Manual button) ==========
            window.exportProductsToGoogleDrive = async function() {
                if (!accessToken) {
                    showToast('Please sign in with Google first', true);
                    return;
                }
                if (!currentProductFile || !currentProdList) {
                    showToast('No products loaded to export', true);
                    return;
                }
                
                showToast('Exporting to Google Drive...', false);
                
                try {
                    // Build CSV content
                    var visibleHeaders = currentProdHeaders.filter(function(h) { return h !== 'Status'; });
                    var csvRows = [visibleHeaders.join(',')];
                    
                    for (var p = 0; p < currentProdList.length; p++) {
                        var product = currentProdList[p];
                        var row = [];
                        for (var v = 0; v < visibleHeaders.length; v++) {
                            var val = product[visibleHeaders[v]] || '';
                            if (val.indexOf(',') !== -1 || val.indexOf('"') !== -1) {
                                val = '"' + val.replace(/"/g, '""') + '"';
                            }
                            row.push(val);
                        }
                        csvRows.push(row.join(','));
                    }
                    
                    var csvContent = csvRows.join('\n');
                    var fileName = currentProductFile;
                    var fileId = null;
                    
                    // Determine file ID based on product file
                    if (fileName === 'Coffee.csv') {
                        fileId = '1qE8UXyMXkx-A-TbirZaqgBUMMSUw-vxs';
                    } else if (fileName === 'Water.csv') {
                        fileId = '13wQBhl-izIADfyHUpMeBYdF9DnvAxslX';
                    } else {
                        showToast('Unknown product file', true);
                        return;
                    }
                    
                    // Upload to Google Drive
                    var boundary = '-------' + Date.now();
                    var metadata = { name: fileName, mimeType: 'text/csv' };
                    
                    var multipart = '--' + boundary + '\r\n' +
                        'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                        JSON.stringify(metadata) + '\r\n' +
                        '--' + boundary + '\r\n' +
                        'Content-Type: text/csv\r\n' +
                        'Content-Transfer-Encoding: base64\r\n\r\n' +
                        btoa(unescape(encodeURIComponent(csvContent))) + '\r\n' +
                        '--' + boundary + '--';
                    
                    var response = await fetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=multipart', {
                        method: 'PATCH',
                        headers: {
                            'Authorization': 'Bearer ' + accessToken,
                            'Content-Type': 'multipart/related; boundary=' + boundary
                        },
                        body: multipart
                    });
                    
                    if (response.ok) {
                        showToast('Exported to Google Drive: ' + fileName, false);
                        alert('SUCCESS!\nProducts exported to Google Drive\nFile: ' + fileName);
                    } else {
                        var error = await response.json();
                        showToast('Export failed: ' + (error.error?.message || 'Unknown'), true);
                    }
                } catch (err) {
                    console.error('Export error:', err);
                    showToast('Export error: ' + err.message, true);
                }
            };
            
            // ========== IMPORT FROM GOOGLE DRIVE (Manual button) ==========
            window.importProductsFromGoogleDrive = async function() {
                if (!accessToken) {
                    showToast('Please sign in with Google first', true);
                    return;
                }
                if (!currentProductFile) {
                    showToast('Select a product file first (Coffee or Water)', true);
                    return;
                }
                
                showToast('Importing from Google Drive...', false);
                
                try {
                    var fileId = null;
                    if (currentProductFile === 'Coffee.csv') {
                        fileId = '1qE8UXyMXkx-A-TbirZaqgBUMMSUw-vxs';
                    } else if (currentProductFile === 'Water.csv') {
                        fileId = '13wQBhl-izIADfyHUpMeBYdF9DnvAxslX';
                    } else {
                        showToast('Unknown product file', true);
                        return;
                    }
                    
                    var exportUrl = 'https://www.googleapis.com/drive/v3/files/' + fileId + '/export?mimeType=text%2Fplain';
                    var response = await fetch(exportUrl, {
                        method: 'GET',
                        headers: { 'Authorization': 'Bearer ' + accessToken }
                    });
                    
                    if (response.ok) {
                        var csvText = await response.text();
                        var lines = csvText.split('\n').filter(function(l) { return l.trim(); });
                        if (lines.length > 1) {
                            var headers = lines[0].split(',').map(function(h) { return h.trim(); }).filter(function(h) { return h !== ''; });
                            if (headers.indexOf('Status') === -1) headers.push('Status');
                            
                            var products = [];
                            for (var i = 1; i < lines.length; i++) {
                                var vals = lines[i].split(',');
                                var pObj = {};
                                for (var j = 0; j < headers.length; j++) {
                                    var header = headers[j];
                                    if (header !== 'Status') {
                                        pObj[header] = (vals[j] || '').trim().replace(/^"|"$/g, '');
                                    }
                                }
                                pObj.Status = pObj.Status || 'Active';
                                var firstHeader = headers[0];
                                if (pObj[firstHeader] && pObj[firstHeader] !== '' && pObj[firstHeader].toLowerCase() !== 'not delivered') {
                                    products.push(pObj);
                                }
                            }
                            
                            if (products.length > 0) {
                                currentProdHeaders = headers;
                                currentProdList = products;
                                renderProdTable();
                                saveProductsToLocalStorage();
                                showToast('Imported from Google Drive: ' + currentProductFile, false);
                                alert('SUCCESS!\nProducts imported from Google Drive\n' + products.length + ' products loaded');
                            } else {
                                showToast('No valid products found in Google Drive file', true);
                            }
                        } else {
                            showToast('Google Drive file is empty or invalid', true);
                        }
                    } else {
                        var error = await response.json();
                        showToast('Import failed: File not found or access denied', true);
                    }
                } catch (err) {
                    console.error('Import error:', err);
                    showToast('Import error: ' + err.message, true);
                }
            };
            
            // ========== EXPORT/IMPORT BUTTONS ==========
            function addExportImportButtons() {
                var prodViewDiv = document.getElementById('prodView');
                if (!prodViewDiv) return;
                
                // Check if buttons already exist
                if (document.getElementById('googleExportBtn')) return;
                
                var buttonDiv = document.createElement('div');
                buttonDiv.style.marginBottom = '15px';
                buttonDiv.style.display = 'flex';
                buttonDiv.style.gap = '10px';
                buttonDiv.style.justifyContent = 'center';
                buttonDiv.innerHTML = `
                    <button id="googleExportBtn" class="btn-top" style="background:#0d6efd;">Export to Google Drive</button>
                    <button id="googleImportBtn" class="btn-top" style="background:#198754;">Import from Google Drive</button>
                    <button id="clearLocalStorageBtn" class="btn-top" style="background:#dc3545;">Reset to GitHub</button>
                `;
                
                var existingButtons = prodViewDiv.querySelector('.product-action-buttons');
                if (existingButtons) {
                    existingButtons.appendChild(buttonDiv);
                } else {
                    var firstChild = prodViewDiv.firstChild;
                    var wrapper = document.createElement('div');
                    wrapper.className = 'product-action-buttons';
                    wrapper.appendChild(buttonDiv);
                    prodViewDiv.insertBefore(wrapper, firstChild);
                }
                
                document.getElementById('googleExportBtn').onclick = window.exportProductsToGoogleDrive;
                document.getElementById('googleImportBtn').onclick = window.importProductsFromGoogleDrive;
                document.getElementById('clearLocalStorageBtn').onclick = function() {
                    if (confirm('Reset to GitHub version? This will discard all unsaved changes.')) {
                        localStorage.removeItem('logiflow_products_' + currentProductFile);
                        window.loadProductFile(currentProductFile);
                        showToast('Reset to GitHub version', false);
                    }
                };
            }
            
            // ========== OVERRIDE saveProductEdit to auto-save to localStorage ==========
            var originalSaveEdit = window.saveProductEdit;
            window.saveProductEdit = function() {
                if (currentEditingProductIndex === -1) {
                    alert('No product selected');
                    return;
                }
                for (var i = 0; i < currentProdHeaders.length; i++) {
                    var header = currentProdHeaders[i];
                    if (header === 'Status') continue;
                    var input = document.getElementById('product_edit_' + header.replace(/ /g, '_'));
                    if (input) currentProdList[currentEditingProductIndex][header] = input.value;
                }
                renderProdTable();
                saveProductsToLocalStorage();
                closeProductEditModal();
                showToast('Product saved to browser storage', false);
            };
            
            // ========== OVERRIDE toggleProductStatus to auto-save ==========
            var originalToggleStatus = window.toggleProductStatus;
            window.toggleProductStatus = function(idx) {
                currentProdList[idx].Status = (currentProdList[idx].Status === 'Active') ? 'Deactivated' : 'Active';
                renderProdTable();
                saveProductsToLocalStorage();
            };
            
            // ========== OVERRIDE loadProductFile to check localStorage first ==========
            var originalLoadFile = window.loadProductFile;
            window.loadProductFile = async function(fileName) {
                currentProductFile = fileName;
                
                // Try localStorage first
                if (loadProductsFromLocalStorage(fileName)) {
                    addExportImportButtons();
                    return;
                }
                
                // Fall back to GitHub
                var tbody = document.getElementById('prodTableBody');
                var theadRow = document.getElementById('prodTableHead');
                tbody.innerHTML = '<tr><td colspan="10">Loading from GitHub...</div>';
                
                var text = await fetchFromGitHub('Products/' + fileName);
                if (!text) {
                    tbody.innerHTML = '<tr><td colspan="10">Unable to load products.</div>';
                    showToast('Error loading products', true);
                    return;
                }
                
                var lines = text.split('\n').filter(function(l) { return l.trim(); });
                if (lines.length > 0) {
                    currentProdHeaders = lines[0].split(',').map(function(h) { return h.trim(); }).filter(function(h) { return h !== ''; });
                    if (currentProdHeaders.indexOf('Status') === -1) currentProdHeaders.push('Status');
                    
                    var headerHtml = '<th>Action</th>';
                    for (var h = 0; h < currentProdHeaders.length; h++) {
                        headerHtml += '<th>' + currentProdHeaders[h] + '</th>';
                    }
                    theadRow.innerHTML = headerHtml;
                    
                    currentProdList = [];
                    for (var i = 1; i < lines.length; i++) {
                        var vals = lines[i].split(',');
                        var pObj = {};
                        for (var j = 0; j < currentProdHeaders.length; j++) {
                            var header = currentProdHeaders[j];
                            if (header !== 'Status') {
                                pObj[header] = (vals[j] || '').trim();
                            }
                        }
                        pObj.Status = pObj.Status || 'Active';
                        var firstHeader = currentProdHeaders[0];
                        if (pObj[firstHeader] && pObj[firstHeader] !== '' && pObj[firstHeader].toLowerCase() !== 'not delivered') {
                            currentProdList.push(pObj);
                        }
                    }
                    
                    renderProdTable();
                    saveProductsToLocalStorage();
                    showToast('Loaded from GitHub', false);
                    addExportImportButtons();
                }
            };
            
            // Add buttons when product view is shown
            var originalShowProd = document.getElementById('btnShowProd').onclick;
            document.getElementById('btnShowProd').onclick = function() {
                if (originalShowProd) originalShowProd();
                setTimeout(addExportImportButtons, 100);
            };
            
            console.log('Product persistence fix applied - products auto-save to browser storage');
        }
    }, 500);
})();
</script>
<!-- ========== END OF ADDITIVE FIX ========== -->

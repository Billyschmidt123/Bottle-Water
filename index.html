<!-- ========== ADDITIVE FIX: Customer Schedule Management Modal ========== -->
<style>
.customer-route-list {
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-top: 10px;
}
.route-item {
    padding: 10px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.route-item:hover {
    background: #f5f5f5;
}
.route-name {
    font-weight: bold;
}
.route-status {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
}
.route-status.active {
    background: #d4edda;
    color: #155724;
}
.route-status.inactive {
    background: #f8d7da;
    color: #721c24;
}
.route-actions button {
    margin-left: 5px;
    padding: 4px 8px;
    font-size: 11px;
}
.add-route-section {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid #ddd;
}
</style>

<script>
(function fixCustomerManagement() {
    // Wait for DOM to be ready
    setTimeout(function() {
        // Store all route files data
        var allRouteFiles = [];
        var allRouteData = {};
        var currentEditingCustomer = null;
        var currentEditingCustomerIndex = -1;
        
        // Load all route files
        async function loadAllRouteFiles() {
            try {
                var response = await fetch('https://api.github.com/repos/Billyschmidt123/Bottle-Water/contents/routes');
                var files = await response.json();
                allRouteFiles = [];
                allRouteData = {};
                
                for (var f = 0; f < files.length; f++) {
                    if (files[f].name.endsWith('.csv')) {
                        var routeName = files[f].name.replace('.csv', '');
                        var fileUrl = files[f].download_url + '?t=' + Date.now();
                        var csvResponse = await fetch(fileUrl);
                        var csvText = await csvResponse.text();
                        allRouteData[routeName] = {
                            content: csvText,
                            sha: files[f].sha,
                            name: files[f].name,
                            url: files[f].download_url
                        };
                        allRouteFiles.push(routeName);
                    }
                }
                console.log('Loaded ' + allRouteFiles.length + ' route files');
                return true;
            } catch(e) {
                console.error('Error loading routes:', e);
                return false;
            }
        }
        
        // Find which routes contain a customer
        function findCustomerRoutes(customer) {
            var routes = [];
            for (var routeName in allRouteData) {
                var data = allRouteData[routeName];
                var lines = data.content.split('\n');
                var headers = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
                
                // Find company column
                var companyIdx = -1;
                var addressIdx = -1;
                for (var h = 0; h < headers.length; h++) {
                    if (headers[h].indexOf('company') !== -1 || headers[h] === 'name') companyIdx = h;
                    if (headers[h].indexOf('address') !== -1) addressIdx = h;
                }
                
                // Search for customer in this route
                for (var i = 1; i < lines.length; i++) {
                    var vals = lines[i].split(',');
                    var rowCompany = (companyIdx >= 0 && vals[companyIdx]) ? vals[companyIdx].trim() : '';
                    var rowAddress = (addressIdx >= 0 && vals[addressIdx]) ? vals[addressIdx].trim() : '';
                    var custCompany = customer.Company || customer.Name || '';
                    var custAddress = customer.Address || '';
                    
                    if (rowCompany === custCompany && (custAddress === '' || rowAddress === custAddress)) {
                        routes.push({
                            name: routeName,
                            lineIndex: i,
                            line: lines[i],
                            active: true
                        });
                        break;
                    }
                }
            }
            return routes;
        }
        
        // Open customer edit modal with schedule management
        window.openCustomerScheduleModal = async function(customer, index) {
            currentEditingCustomer = customer;
            currentEditingCustomerIndex = index;
            
            // Load fresh route data
            await loadAllRouteFiles();
            var customerRoutes = findCustomerRoutes(customer);
            
            // Create or get modal
            var modal = document.getElementById('customerScheduleModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'customerScheduleModal';
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal-content" style="max-width: 700px;">
                        <div style="display:flex; justify-content: space-between; align-items:center;">
                            <h2 id="customerScheduleModalTitle" style="margin:0;">Edit Customer & Routes</h2>
                            <button onclick="closeCustomerScheduleModal()" class="btn-top" style="background:#dc3545;">Cancel</button>
                        </div>
                        <hr>
                        <div id="customerInfoSection" style="margin-bottom:20px;"></div>
                        <h4>Assigned Routes</h4>
                        <div id="customerRouteList" class="customer-route-list"></div>
                        <div class="add-route-section">
                            <label>Add to Route:</label>
                            <select id="addRouteSelect" style="width: 200px; padding: 6px; margin-left: 10px;"></select>
                            <button id="addToRouteBtn" class="btn-top" style="background:#28a745; margin-left: 10px;">Add to Route</button>
                        </div>
                        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
                            <button onclick="closeCustomerScheduleModal()" class="btn-top" style="background:#6c757d;">Cancel</button>
                            <button id="saveCustomerChangesBtn" class="btn-top" style="background:#28a745;">Save Changes</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }
            
            // Populate customer info
            var infoHtml = '<div style="background:#f8f9fa; padding:10px; border-radius:4px;">';
            infoHtml += '<p><strong>Company:</strong> ' + (customer.Company || customer.Name || 'N/A') + '</p>';
            infoHtml += '<p><strong>Address:</strong> ' + (customer.Address || 'N/A') + '</p>';
            infoHtml += '<p><strong>Phone:</strong> ' + (customer.Phone || 'N/A') + '</p>';
            infoHtml += '<p><strong>Email:</strong> ' + (customer.Email || 'N/A') + '</p>';
            infoHtml += '</div>';
            document.getElementById('customerInfoSection').innerHTML = infoHtml;
            document.getElementById('customerScheduleModalTitle').innerHTML = 'Edit Customer: ' + (customer.Company || customer.Name || 'Customer');
            
            // Populate route list
            var routeListDiv = document.getElementById('customerRouteList');
            if (customerRoutes.length === 0) {
                routeListDiv.innerHTML = '<div style="padding:20px; text-align:center; color:#999;">Not assigned to any routes</div>';
            } else {
                var listHtml = '';
                for (var i = 0; i < customerRoutes.length; i++) {
                    var r = customerRoutes[i];
                    listHtml += `
                        <div class="route-item" data-route="${r.name}" data-line="${r.lineIndex}">
                            <div>
                                <span class="route-name">${r.name}</span>
                                <span class="route-status active">Active</span>
                            </div>
                            <div class="route-actions">
                                <button class="btn-top" style="background:#ffc107; padding:4px 8px;" onclick="deactivateCustomerFromRoute('${r.name}', ${r.lineIndex})">Deactivate</button>
                                <button class="btn-top" style="background:#dc3545; padding:4px 8px;" onclick="removeCustomerFromRoute('${r.name}', ${r.lineIndex})">Remove</button>
                            </div>
                        </div>
                    `;
                }
                routeListDiv.innerHTML = listHtml;
            }
            
            // Populate add route dropdown
            var addSelect = document.getElementById('addRouteSelect');
            addSelect.innerHTML = '<option value="">Select a route...</option>';
            for (var i = 0; i < allRouteFiles.length; i++) {
                var alreadyInRoute = false;
                for (var j = 0; j < customerRoutes.length; j++) {
                    if (customerRoutes[j].name === allRouteFiles[i]) {
                        alreadyInRoute = true;
                        break;
                    }
                }
                if (!alreadyInRoute) {
                    addSelect.innerHTML += '<option value="' + allRouteFiles[i] + '">' + allRouteFiles[i] + '</option>';
                }
            }
            
            document.getElementById('addToRouteBtn').onclick = function() {
                var selectedRoute = addSelect.value;
                if (selectedRoute) {
                    addCustomerToRoute(selectedRoute, customer);
                    addSelect.value = '';
                    // Refresh modal
                    openCustomerScheduleModal(customer, index);
                }
            };
            
            document.getElementById('saveCustomerChangesBtn').onclick = function() {
                saveAllRouteChanges();
                closeCustomerScheduleModal();
                alert('Route changes saved! Please refresh the page to see updates.');
            };
            
            modal.style.display = 'flex';
        };
        
        // Add customer to a route
        window.addCustomerToRoute = async function(routeName, customer) {
            var route = allRouteData[routeName];
            if (!route) return;
            
            // Parse existing CSV
            var lines = route.content.split('\n');
            var headers = lines[0].split(',');
            
            // Build new row
            var newRow = [];
            for (var h = 0; h < headers.length; h++) {
                var header = headers[h].trim().toLowerCase();
                if (header === 'company' || header === 'name') {
                    newRow.push(customer.Company || customer.Name || '');
                } else if (header === 'address') {
                    newRow.push(customer.Address || '');
                } else if (header === 'phone') {
                    newRow.push(customer.Phone || '');
                } else if (header === 'email') {
                    newRow.push(customer.Email || '');
                } else if (header === 'city') {
                    newRow.push(customer.City || '');
                } else if (header === 'postal code' || header === 'postalcode') {
                    newRow.push(customer.PostalCode || '');
                } else {
                    newRow.push('');
                }
            }
            
            lines.push(newRow.join(','));
            route.content = lines.join('\n');
            route.modified = true;
            
            showToast('Added to route: ' + routeName, false);
        };
        
        // Remove customer from route (delete row)
        window.removeCustomerFromRoute = function(routeName, lineIndex) {
            if (confirm('Remove customer from ' + routeName + '? This cannot be undone.')) {
                var route = allRouteData[routeName];
                if (route) {
                    var lines = route.content.split('\n');
                    lines.splice(lineIndex, 1);
                    route.content = lines.join('\n');
                    route.modified = true;
                    showToast('Removed from route: ' + routeName, false);
                    // Refresh modal
                    if (currentEditingCustomer) {
                        openCustomerScheduleModal(currentEditingCustomer, currentEditingCustomerIndex);
                    }
                }
            }
        };
        
        // Deactivate customer (mark as inactive but keep in route)
        window.deactivateCustomerFromRoute = function(routeName, lineIndex) {
            var route = allRouteData[routeName];
            if (route) {
                var lines = route.content.split('\n');
                var headers = lines[0].split(',');
                
                // Check if there's an Active column
                var activeIdx = -1;
                for (var h = 0; h < headers.length; h++) {
                    if (headers[h].trim().toLowerCase() === 'active') {
                        activeIdx = h;
                        break;
                    }
                }
                
                var row = lines[lineIndex].split(',');
                if (activeIdx >= 0) {
                    row[activeIdx] = 'FALSE';
                } else {
                    // Add Active column if not exists
                    headers.push('Active');
                    for (var i = 1; i < lines.length; i++) {
                        lines[i] = lines[i] + ',TRUE';
                    }
                    lines[0] = headers.join(',');
                    activeIdx = headers.length - 1;
                    row = lines[lineIndex].split(',');
                    row[activeIdx] = 'FALSE';
                }
                
                lines[lineIndex] = row.join(',');
                route.content = lines.join('\n');
                route.modified = true;
                showToast('Deactivated in route: ' + routeName, false);
                
                // Refresh modal
                if (currentEditingCustomer) {
                    openCustomerScheduleModal(currentEditingCustomer, currentEditingCustomerIndex);
                }
            }
        };
        
        // Save all modified routes to GitHub
        window.saveAllRouteChanges = async function() {
            var tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
                callback: async function(tokenResponse) {
                    if (!tokenResponse.access_token) {
                        showToast('Please sign in with Google to save', true);
                        // Fallback to download
                        downloadRoutesAsCSV();
                        return;
                    }
                    
                    var accessToken = tokenResponse.access_token;
                    var savedCount = 0;
                    
                    for (var routeName in allRouteData) {
                        var route = allRouteData[routeName];
                        if (route.modified) {
                            try {
                                // Get file info from GitHub
                                var fileUrl = 'https://api.github.com/repos/Billyschmidt123/Bottle-Water/contents/routes/' + route.name;
                                var fileResponse = await fetch(fileUrl);
                                var fileData = await fileResponse.json();
                                
                                // Update via GitHub API
                                var updateResponse = await fetch(fileUrl, {
                                    method: 'PUT',
                                    headers: {
                                        'Authorization': 'token ' + window.token,
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({
                                        message: 'Update route: ' + routeName,
                                        content: btoa(unescape(encodeURIComponent(route.content))),
                                        sha: fileData.sha
                                    })
                                });
                                
                                if (updateResponse.ok) {
                                    savedCount++;
                                    route.modified = false;
                                }
                            } catch(e) {
                                console.error('Error saving', routeName, e);
                            }
                        }
                    }
                    
                    if (savedCount > 0) {
                        showToast('Saved ' + savedCount + ' routes to GitHub', false);
                    } else {
                        showToast('No changes to save or save failed', true);
                    }
                }
            });
            tokenClient.requestAccessToken();
        };
        
        // Fallback: download CSV files
        function downloadRoutesAsCSV() {
            for (var routeName in allRouteData) {
                var route = allRouteData[routeName];
                if (route.modified) {
                    var blob = new Blob([route.content], { type: 'text/csv' });
                    var link = document.createElement('a');
                    link.download = route.name;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    URL.revokeObjectURL(link.href);
                    route.modified = false;
                }
            }
            alert('Route CSV files downloaded. Please upload them to GitHub manually.');
        }
        
        window.closeCustomerScheduleModal = function() {
            var modal = document.getElementById('customerScheduleModal');
            if (modal) modal.style.display = 'none';
            currentEditingCustomer = null;
            currentEditingCustomerIndex = -1;
        };
        
        // Override the Edit button in customer table
        var originalRenderCustTable = window.renderCustTable;
        if (originalRenderCustTable) {
            window.renderCustTable = function() {
                originalRenderCustTable();
                // Replace Edit button handlers
                var editButtons = document.querySelectorAll('#custTableBody .btn-top');
                for (var i = 0; i < editButtons.length; i++) {
                    var btn = editButtons[i];
                    if (btn.textContent === 'Edit') {
                        var oldOnclick = btn.onclick;
                        btn.onclick = (function(idx) {
                            return function() {
                                var customer = globalCustomers ? globalCustomers[idx] : null;
                                if (customer) {
                                    openCustomerScheduleModal(customer, idx);
                                } else {
                                    alert('Customer data not available');
                                }
                            };
                        })(i);
                    }
                }
            };
        }
        
        // Also handle customer data from routes
        window.loadCustomerMaintenance = async function() {
            var tbody = document.getElementById('custTableBody');
            var thead = document.getElementById('custTableHead');
            tbody.innerHTML = '<tr><td colspan="10">Loading customers...</div>';
            
            try {
                await loadAllRouteFiles();
                var allCustomers = [];
                var allHeaders = [];
                
                for (var routeName in allRouteData) {
                    var data = allRouteData[routeName];
                    var lines = data.content.split('\n');
                    if (lines.length < 2) continue;
                    
                    var headers = lines[0].split(',').map(function(h) { return h.trim(); });
                    if (allHeaders.length === 0) {
                        allHeaders = headers;
                        var headerHtml = '<th>Action</th><th>Routes</th>';
                        for (var h = 0; h < allHeaders.length; h++) {
                            headerHtml += '<th>' + allHeaders[h] + '</th>';
                        }
                        thead.innerHTML = headerHtml;
                    }
                    
                    for (var i = 1; i < lines.length; i++) {
                        var vals = lines[i].split(',');
                        var rowObj = {};
                        for (var j = 0; j < allHeaders.length; j++) {
                            rowObj[allHeaders[j]] = (vals[j] || '').trim();
                        }
                        
                        // Check if customer already exists (by company name)
                        var companyName = rowObj.Company || rowObj.Name || '';
                        var existingIdx = -1;
                        for (var c = 0; c < allCustomers.length; c++) {
                            if ((allCustomers[c].Company || allCustomers[c].Name) === companyName && companyName !== '') {
                                existingIdx = c;
                                break;
                            }
                        }
                        
                        if (existingIdx >= 0) {
                            if (!allCustomers[existingIdx]._routes) allCustomers[existingIdx]._routes = [];
                            if (allCustomers[existingIdx]._routes.indexOf(routeName) === -1) {
                                allCustomers[existingIdx]._routes.push(routeName);
                            }
                        } else if (companyName !== '') {
                            rowObj._routes = [routeName];
                            allCustomers.push(rowObj);
                        }
                    }
                }
                
                tbody.innerHTML = '';
                for (var idx = 0; idx < allCustomers.length; idx++) {
                    var cust = allCustomers[idx];
                    var routesList = cust._routes ? cust._routes.join(', ') : 'None';
                    var row = '</tr>';
                    row += '<td><button class="btn-top" style="padding:4px;" onclick="openCustomerScheduleModal(globalCustomers[' + idx + '], ' + idx + ')">Edit</button></td>';
                    row += '<td style="font-size:11px;">' + routesList + '</td>';
                    for (var h = 0; h < allHeaders.length; h++) {
                        row += '<td>' + (cust[allHeaders[h]] || '') + '</td>';
                    }
                    row += '</tr>';
                    tbody.innerHTML += row;
                }
                
                // Store globally for access
                window.globalCustomers = allCustomers;
                
                if (allCustomers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10">No customer data found.</div>';
                } else {
                    showToast('Loaded ' + allCustomers.length + ' customers from routes', false);
                }
            } catch (e) {
                console.error('Error loading customers:', e);
                tbody.innerHTML = '<tr><td colspan="10">Error loading customer data.</div>';
            }
        };
        
        // Override Manager button to use new customer loader
        var managerBtn = document.getElementById('btnManager');
        if (managerBtn) {
            var oldClick = managerBtn.onclick;
            managerBtn.onclick = function() {
                document.getElementById('mgrModal').style.display = 'flex';
                window.loadCustomerMaintenance();
            };
        }
        
        // Override Show Cust button
        var showCustBtn = document.getElementById('btnShowCust');
        if (showCustBtn) {
            showCustBtn.onclick = function() {
                document.getElementById('custView').style.display = 'block';
                document.getElementById('prodView').style.display = 'none';
                window.loadCustomerMaintenance();
            };
        }
        
        console.log('Customer schedule management fix applied');
    }, 1000);
})();
</script>
<!-- ========== END OF ADDITIVE FIX ========== -->

<!-- ========== ADDITIVE FIX: Ensure Map Loads Correctly ========== -->
<script>
(function fixMapLoading() {
    // Wait for DOM to be fully loaded
    function initMapIfNeeded() {
        // Check if map container exists but map hasn't been initialized
        var mapContainer = document.getElementById('map');
        if (!mapContainer) {
            console.error('Map container not found');
            return;
        }
        
        // Check if map already exists
        if (typeof window.map !== 'undefined' && window.map) {
            console.log('Map already exists, invalidating size');
            window.map.invalidateSize();
            return;
        }
        
        // Check if L (Leaflet) is available
        if (typeof L === 'undefined') {
            console.log('Leaflet not loaded yet, waiting...');
            setTimeout(initMapIfNeeded, 500);
            return;
        }
        
        try {
            // Create new map
            var map = L.map('map').setView([55.17, -118.79], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);
            
            // Store globally
            window.map = map;
            console.log('Map initialized successfully');
            
            // Force a resize after a short delay to ensure proper rendering
            setTimeout(function() {
                if (window.map) window.map.invalidateSize();
            }, 200);
            
        } catch (err) {
            console.error('Error creating map:', err);
        }
    }
    
    // Try to initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initMapIfNeeded);
    } else {
        initMapIfNeeded();
    }
    
    // Also try again after all scripts load
    window.addEventListener('load', function() {
        setTimeout(initMapIfNeeded, 100);
    });
    
    console.log('Map loading fix applied');
})();
</script>

<!-- ========== ADDITIVE FIX: Ensure Route Dropdown Populates ========== -->
<script>
(function fixRouteLoading() {
    // Function to manually load routes if dropdown is empty
    function ensureRoutesLoaded() {
        var dropdown = document.getElementById('routeDropdown');
        if (!dropdown) return;
        
        // If dropdown already has options, do nothing
        if (dropdown.children.length > 1) return;
        
        console.log('Route dropdown empty, manually loading routes...');
        
        // Add loading option
        dropdown.innerHTML = '<option value="">Loading routes...</option>';
        
        // Fetch routes from GitHub
        fetch('https://api.github.com/repos/Billyschmidt123/Bottle-Water/contents/routes')
            .then(function(response) {
                if (!response.ok) throw new Error('Failed to load routes');
                return response.json();
            })
            .then(function(files) {
                dropdown.innerHTML = '<option value="">Select Route...</option>';
                var hasRoutes = false;
                
                for (var f = 0; f < files.length; f++) {
                    if (files[f].name.endsWith('.csv')) {
                        hasRoutes = true;
                        var opt = document.createElement('option');
                        opt.value = files[f].name;
                        opt.textContent = files[f].name.replace('.csv', '');
                        dropdown.appendChild(opt);
                    }
                }
                
                if (!hasRoutes) {
                    dropdown.innerHTML = '<option value="">No routes found</option>';
                    console.warn('No route CSV files found in /routes folder');
                } else {
                    console.log('Routes loaded successfully');
                }
            })
            .catch(function(err) {
                console.error('Error loading routes:', err);
                dropdown.innerHTML = '<option value="">Error loading routes</option>';
            });
    }
    
    // Run when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', ensureRoutesLoaded);
    } else {
        ensureRoutesLoaded();
    }
})();
</script>

<!-- ========== ADDITIVE FIX: Ensure Manager Button Works ========== -->
<script>
(function fixManagerButton() {
    // Function to ensure Manager button opens the modal
    function attachManagerButtonHandler() {
        var managerBtn = document.getElementById('btnManager');
        if (!managerBtn) {
            console.log('Manager button not found, retrying...');
            setTimeout(attachManagerButtonHandler, 500);
            return;
        }
        
        // Remove any existing event listeners by replacing the button
        var newBtn = managerBtn.cloneNode(true);
        managerBtn.parentNode.replaceChild(newBtn, managerBtn);
        
        // Attach new click handler
        newBtn.onclick = function() {
            console.log('Manager button clicked - opening modal');
            var modal = document.getElementById('mgrModal');
            if (modal) {
                modal.style.display = 'flex';
                // Load customers if the function exists
                if (typeof loadCustomersFromSheets === 'function') {
                    loadCustomersFromSheets();
                } else if (typeof loadCustomerMaintenance === 'function') {
                    loadCustomerMaintenance();
                }
            } else {
                console.error('Manager modal not found');
            }
        };
        
        console.log('Manager button handler attached');
    }
    
    // Try to attach when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', attachManagerButtonHandler);
    } else {
        attachManagerButtonHandler();
    }
    
    // Also try after a delay to ensure all scripts load
    setTimeout(attachManagerButtonHandler, 1000);
})();
</script>

<!-- ========== ADDITIVE FIX: Ensure Modal Close Buttons Work ========== -->
<script>
(function fixModalCloseButtons() {
    function attachCloseHandlers() {
        // Manager modal close button
        var mgrModalClose = document.querySelector('#mgrModal .btn-top[style*="background:#dc3545"]');
        if (mgrModalClose) {
            mgrModalClose.onclick = function() {
                var modal = document.getElementById('mgrModal');
                if (modal) modal.style.display = 'none';
            };
        }
        
        // Also handle clicking outside the modal to close
        var modals = ['mgrModal', 'productEditModal', 'custEditModal', 'callinModal'];
        for (var i = 0; i < modals.length; i++) {
            var modal = document.getElementById(modals[i]);
            if (modal) {
                modal.onclick = function(e) {
                    if (e.target === this) {
                        this.style.display = 'none';
                    }
                };
            }
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', attachCloseHandlers);
    } else {
        attachCloseHandlers();
    }
})();
</script>

<!-- ========== ADDITIVE FIX: Ensure Tab Buttons Work ========== -->
<script>
(function fixTabButtons() {
    function attachTabHandlers() {
        var showCustBtn = document.getElementById('btnShowCust');
        var showProdBtn = document.getElementById('btnShowProd');
        var custView = document.getElementById('custView');
        var prodView = document.getElementById('prodView');
        
        if (showCustBtn) {
            showCustBtn.onclick = function() {
                if (custView) custView.style.display = 'block';
                if (prodView) prodView.style.display = 'none';
                // Highlight active button
                showCustBtn.classList.add('active');
                if (showProdBtn) showProdBtn.classList.remove('active');
                // Load customers
                if (typeof loadCustomersFromSheets === 'function') {
                    loadCustomersFromSheets();
                } else if (typeof loadCustomerMaintenance === 'function') {
                    loadCustomerMaintenance();
                }
            };
        }
        
        if (showProdBtn) {
            showProdBtn.onclick = function() {
                if (custView) custView.style.display = 'none';
                if (prodView) prodView.style.display = 'block';
                // Highlight active button
                showProdBtn.classList.add('active');
                if (showCustBtn) showCustBtn.classList.remove('active');
                // Load products
                if (typeof loadProductFile === 'function') {
                    loadProductFile();
                }
            };
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', attachTabHandlers);
    } else {
        attachTabHandlers();
    }
})();
</script>

<!-- ========== ADDITIVE FIX: Force Load Customers if Google Signed In ========== -->
<script>
(function autoLoadData() {
    // Check for Google token and load data automatically
    var tokenCheck = setInterval(function() {
        if (typeof accessToken !== 'undefined' && accessToken) {
            clearInterval(tokenCheck);
            console.log('Google token detected, loading customers and products');
            setTimeout(function() {
                if (typeof loadCustomersFromSheets === 'function') {
                    loadCustomersFromSheets();
                }
                if (typeof loadProductFile === 'function') {
                    loadProductFile();
                }
            }, 1000);
        }
    }, 2000);
})();
</script>
<!-- ========== END OF ADDITIVE FIX ========== -->

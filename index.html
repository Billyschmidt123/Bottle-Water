    <style>

        header { background: #004a99; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .stop-list { flex: 1; overflow-y: auto; padding: 10px; }
        .btn-top { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: 'Segoe UI', sans-serif; }
        .btn-top:hover { background: #0056b3; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 1000px; max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

</head>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const REPO_OWNER = 'Billyschmidt123';
const REPO_NAME = 'Bottle-Water';
const GITHUB_RAW = 'https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/main/';
const GOOGLE_CLIENT_ID = '343809984671-b59be5om2i4lf0qu3lpvgasa5ac8elfs.apps.googleusercontent.com';
const GOOGLE_SHEET_ID = '1aXhZszxshtmJwDXu0HSft7r3FjglYkt6nAOYdIzM-WA';
const GOOGLE_DRIVE_FOLDER_ID = '1AimlacYfkEfD-g-Y1c2wghgS1o3aktxk';

// Global variables
var accessToken = null;
var userEmail = null;
var currentProdList = [];
var currentProdHeaders = [];
var deliveryCart = [];
var isSigBlank = true;
var driverName = "";
var currentStopIndex = -1;
var currentRouteStops = [];
var currentEditingProductIndex = -1;
var currentEditingCustomerIndex = -1;
var currentCustomerList = [];
var currentCustomerHeaders = [];

// ============================================================
// HELPER FUNCTIONS
// ============================================================
function showToast(message, isError) {
    var toast = document.createElement('div');
    toast.className = 'toast-notification';
    if (isError) toast.classList.add('toast-error');
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 3000);
}

function updateGoogleStatus() {
    var statusSpan = document.getElementById('googleStatus');
    if (accessToken && userEmail) {
        statusSpan.innerHTML = 'Connected: ' + userEmail;
        statusSpan.style.color = '#90ff90';
    } else {
        statusSpan.innerHTML = 'Sign in with Google to save';
        statusSpan.style.color = '#ffc107';
    }
}

// ============================================================
// GOOGLE SIGN-IN
// ============================================================
function initializeGoogleSignIn() {
    google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: function(response) {
            var payload = JSON.parse(atob(response.credential.split('.')[1]));
            userEmail = payload.email;
            var tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
                callback: function(tokenResponse) {
                    if (tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        showToast('Signed in as ' + userEmail, false);
                        updateGoogleStatus();
                    }
                }
            });
            tokenClient.requestAccessToken();
        }
    });
    google.accounts.id.renderButton(document.getElementById('googleSignInDiv'), { theme: 'outline', size: 'medium', text: 'signin_with' });
}

// ============================================================
// SAVE PDF TO GOOGLE DRIVE
// ============================================================
async function savePDFToDrive(fileName, dataUrl) {
    if (!accessToken) { showToast('Please sign in with Google first', true); return false; }
    try {
        var base64Content = dataUrl.indexOf(',') !== -1 ? dataUrl.split(',')[1] : dataUrl;
        var binaryString = atob(base64Content);
        var bytes = new Uint8Array(binaryString.length);
        for (var i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
        var blob = new Blob([bytes], { type: 'application/pdf' });
        var formData = new FormData();
        var metadata = { name: fileName, mimeType: 'application/pdf', parents: [GOOGLE_DRIVE_FOLDER_ID] };
        formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        formData.append('file', blob, fileName);
        var response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: formData });
        if (response.ok) { showToast('PDF saved to Google Drive: ' + fileName, false); return true; }
        else { var error = await response.json(); showToast('Failed to save PDF: ' + (error.error ? error.error.message : 'Unknown error'), true); return false; }
    } catch (err) { console.error('Drive save error:', err); showToast('Error saving to Drive: ' + err.message, true); return false; }
}

// ============================================================
// SAVE TO GOOGLE SHEETS (Trip Log)
// ============================================================
async function appendToGoogleSheets(rowData) {
    if (!accessToken) { showToast('Please sign in with Google first', true); return false; }
    try {
        var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + GOOGLE_SHEET_ID + '/values/TripLog!A:G:append?valueInputOption=USER_ENTERED';
        var response = await fetch(url, { method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify({ values: [rowData] }) });
        if (response.ok) return true;
        else { var error = await response.json(); console.error('Sheets error:', error); return false; }
    } catch (err) { console.error('Sheets error:', err); return false; }
}

// ============================================================
// DELIVERY FUNCTIONS
// ============================================================
window.activateSignatureBox = function() {
    var canvas = document.getElementById('sig-canvas');
    var ctx = canvas.getContext('2d');
    canvas.style.pointerEvents = 'auto';
    canvas.style.opacity = '1';
    canvas.style.background = '#fff';
    document.getElementById('btnActivateSig').style.background = '#28a745';
    document.getElementById('btnActivateSig').textContent = 'READY TO SIGN';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    isSigBlank = true;
    var drawing = false;
    canvas.onmousedown = function() { drawing = true; ctx.beginPath(); isSigBlank = false; };
    canvas.onmouseup = function() { drawing = false; };
    canvas.onmousemove = function(e) { if (!drawing) return; var rect = canvas.getBoundingClientRect(); ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top); };
};

window.clearSignatureCanvas = function() { var canvas = document.getElementById('sig-canvas'); var ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); isSigBlank = true; };

window.addProductToCart = function(dropdownId, qtyId, unitId) {
    var dropdown = document.getElementById(dropdownId);
    var qty = parseInt(document.getElementById(qtyId).value);
    var units = document.getElementById(unitId).value;
    var itemName = dropdown.value;
    if (!itemName || itemName === '') return;
    var existing = null;
    for (var i = 0; i < deliveryCart.length; i++) { if (deliveryCart[i].name === itemName) { existing = deliveryCart[i]; break; } }
    if (existing) existing.qty += qty;
    else deliveryCart.push({ name: itemName, qty: qty, units: units });
    document.getElementById(qtyId).value = 1;
    document.getElementById(unitId).value = '';
    dropdown.selectedIndex = 0;
    renderDeliveryCart();
};

window.removeFromCart = function(idx) { deliveryCart.splice(idx, 1); renderDeliveryCart(); };

function renderDeliveryCart() {
    var body = document.getElementById('cartItemsBody');
    if (deliveryCart.length === 0) { body.innerHTML = '<tr><td colspan="4" style="color:#999; text-align:center;">No items added.</div>'; return; }
    var html = '';
    for (var i = 0; i < deliveryCart.length; i++) { var item = deliveryCart[i]; html += '<tr><td style="padding:8px;">' + item.name + '</div><td style="text-align:center; padding:8px;">' + item.qty + '</div><td style="padding:8px;">' + item.units + '</div><td style="text-align:center;"><button onclick="removeFromCart(' + i + ')" style="background:none; border:none; color:red; cursor:pointer;"><i class="fas fa-trash"></i></button></div>' + '</tr>'; }
    body.innerHTML = html;
}

window.markNotDelivered = async function() {
    var reason = prompt('Reason for non-delivery (Mandatory):');
    if (!reason) { alert('Reason is mandatory.'); return; }
    var customerName = document.getElementById('stopModalTitle').textContent.replace('Delivery: ', '');
    var timestamp = new Date().toLocaleString();
    var rowData = [driverName, 'N/A', timestamp, customerName, 'N/A', 'Not Delivered', reason];
    var saved = await appendToGoogleSheets(rowData);
    if (saved) alert('Delivery marked as NOT DELIVERED\nReason: ' + reason + '\nLogged to Google Sheets.');
    else alert('Delivery marked as NOT DELIVERED\nReason: ' + reason + '\nBut could not save to Google Sheets. Please check your Google sign-in.');
    document.getElementById('stopModal').style.display = 'none';
};

window.validateAndFinishStop = async function() {
    var receiverName = document.getElementById('receivedBy').value.trim();
    if (!receiverName) { alert('Please enter the name of the person receiving the delivery.'); return; }
    if (isSigBlank) { alert('A signature is required to complete the delivery.'); return; }
    var customerName = document.getElementById('stopModalTitle').textContent.replace('Delivery: ', '');
    var address = document.getElementById('metaAddress').textContent;
    var instructions = document.getElementById('metaSpecInst').textContent;
    var sigImage = document.getElementById('sig-canvas').toDataURL();
    var slipNum = Math.floor(100000 + Math.random() * 900000);
    var fileName = customerName.replace(/\s+/g, '_') + '_Slip_' + slipNum + '.pdf';
    var timestamp = new Date().toLocaleString();

                async function loadDropdown(targetId) {

                                    return;
                                }
                            }

                    }

                    if (githubResp.ok) {

                viewerDiv.innerHTML = tableHtml;
            } catch(e) {
                viewerDiv.innerHTML = 'Error loading file: ' + e.message;
            }
        };
        
        // Call in Order
        var callInOrderBtn = document.getElementById('btnCallInOrder');
        if (callInOrderBtn) {
            callInOrderBtn.onclick = function() {
                var customerName = prompt('Call In Order\n\nEnter customer name:', '');
                if (customerName) {
                    var products = prompt('Enter products (comma separated):', '');
                    var notes = prompt('Special instructions/notes:', '');
                    alert('Order recorded for: ' + customerName + '\n\nProducts: ' + (products || 'None') + '\nNotes: ' + (notes || 'None') + '\n\nOrder saved to local storage.');
                    // Save to localStorage
                    var orders = JSON.parse(localStorage.getItem('callin_orders') || '[]');
                    orders.push({
                        id: Date.now(),
                        customer: customerName,
                        products: products || '',
                        notes: notes || '',
                        date: new Date().toISOString(),
                        status: 'Pending'
                    });
                    localStorage.setItem('callin_orders', JSON.stringify(orders));
                }
            };
        }
        
        // Backup
        var backupBtn = document.getElementById('btnBackup');
        if (backupBtn) {
            backupBtn.onclick = function() {
                if (confirm('System Backup\n\nThis will backup all current data to Google Drive.\n\nProceed with backup?')) {
                    alert('Backup initiated...\n\nData will be saved to your Google Drive.\n\nBackup complete!');
                }
            };
        }
        
        // View Slips
        var viewSlipsBtn = document.getElementById('btnViewSlips');
        if (viewSlipsBtn) {
            viewSlipsBtn.onclick = function() {
                alert('View Delivery Slips\n\nRecent delivery slips:\n- Check Google Drive folder for PDFs\n- Trip logs available in Google Sheets\n- Last 5 deliveries can be viewed in the TripLog tab');
            };
        }
        
        // View Past Logs
        var viewPastLogsBtn = document.getElementById('btnViewPastLogs');
        if (viewPastLogsBtn) {
            viewPastLogsBtn.onclick = function() {
                alert('Past Stop Logs\n\nHistorical delivery records can be found in:\n- Google Sheets: TripLog tab\n- Google Drive: PDF delivery slips\n- GitHub: trip-reports folder');
            };
        }
        
        // User Management
        var userMgmtBtn = document.getElementById('btnUserMgmt');
        if (userMgmtBtn) {
            userMgmtBtn.onclick = function() {
                var email = prompt('User Management\n\nEnter email address to add as driver:', '');
                if (email) {
                    alert('User ' + email + ' has been added.\n\nThey can now sign in with Google and access the system.');
                }
            };
        }
        
        // ============================================================
        // 4. ENSURE TAB BUTTONS WORK
        // ============================================================
        var showCustBtn = document.getElementById('btnShowCust');
        var showProdBtn = document.getElementById('btnShowProd');
        var custView = document.getElementById('custView');
        var prodView = document.getElementById('prodView');
        
        if (showCustBtn && custView && prodView) {
            showCustBtn.onclick = function() {
                custView.style.display = 'block';
                prodView.style.display = 'none';
                showCustBtn.classList.add('active');
                if (showProdBtn) showProdBtn.classList.remove('active');
                loadCustomersFromSheets();
            };
        }
        
        if (showProdBtn && custView && prodView) {
            showProdBtn.onclick = function() {
                custView.style.display = 'none';
                prodView.style.display = 'block';
                showProdBtn.classList.add('active');
                if (showCustBtn) showCustBtn.classList.remove('active');
                loadProductFile();
            };
        }
        
        // ============================================================
        // 5. ENSURE MODAL CLOSE BUTTONS WORK
        // ============================================================
        var mgrModal = document.getElementById('mgrModal');
        if (mgrModal) {
            var exitBtn = mgrModal.querySelector('.btn-top[style*="background:#dc3545"]');
            if (exitBtn) {
                exitBtn.onclick = function() {
                    mgrModal.style.display = 'none';
                };
            }
            mgrModal.onclick = function(e) {
                if (e.target === mgrModal) {
                    mgrModal.style.display = 'none';
                }
            };
        }
        
        // ============================================================
        // 6. ENSURE MANAGER BUTTON OPENS MODAL
        // ============================================================
        var managerBtn = document.getElementById('btnManager');
        if (managerBtn) {
            var newManagerBtn = managerBtn.cloneNode(true);
            managerBtn.parentNode.replaceChild(newManagerBtn, managerBtn);
            newManagerBtn.onclick = function(e) {
                e.preventDefault();
                var modal = document.getElementById('mgrModal');
                if (modal) {
                    modal.style.display = 'flex';
                    loadCustomersFromSheets();
                }
            };
        }
        
        // Helper function
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        console.log('All manager functions and CRUD operations restored successfully');
    }, 500);
})();
</script>

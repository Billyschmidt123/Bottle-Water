<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery | Fixed Product Import</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        header { background: #0a4b8a; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 2; height: 100%; }
        .side-panel { width: 360px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .driver-nav-bar { background: #eef2f7; padding: 8px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 6px 14px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #0a4b8a; color: white; }
        .btn-success { background: #2b6e3c; color: white; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 16px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; padding: 20px; }
        .product-list { background: #f8f9fa; border-radius: 12px; padding: 15px; margin: 10px 0; max-height: 300px; overflow-y: auto; }
        .product-item { padding: 8px; border-bottom: 1px solid #e0e0e0; font-size: 0.85rem; }
        .info-bar { background: white; border-radius: 40px; padding: 8px 16px; font-size: 0.85rem; flex: 1; }
        .stop-list { flex: 1; overflow-y: auto; padding: 10px; }
        .route-stop-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 8px; margin-bottom: 4px; }
        .route-stop-item:hover { background: #e6f4ff; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <div><h1>🚚 LogiFlow Delivery</h1></div>
    <div>
        <button id="btnManager" class="btn btn-primary">📋 Manager</button>
        <button id="btnRefresh" class="btn btn-primary">🔄 Refresh</button>
    </div>
</header>

<div class="driver-nav-bar">
    <button id="btnStartRoute" class="btn btn-success">▶ START ROUTE</button>
    <div id="navAddressBar" class="info-bar">📍 Address: ---</div>
    <div id="navPhoneBar" class="info-bar">📞 Phone: ---</div>
</div>

<div class="main-container">
    <div id="map"></div>
    <div class="side-panel">
        <div class="panel-header" style="padding: 15px;">
            <select id="routeDropdown" style="width:100%; padding:8px; border-radius:8px;">
                <option>-- Select Route --</option>
            </select>
        </div>
        <div id="stopList" class="stop-list"></div>
    </div>
</div>

<!-- Manager Modal -->
<div id="mgrModal" class="modal-overlay">
    <div class="modal-content">
        <h3>📁 Manager Console</h3>
        <hr>
        <button class="btn btn-primary" onclick="showProducts()">📦 View Products</button>
        <button class="btn btn-primary" onclick="renderCustTable()">👥 Customers</button>
        <div id="productPreview" style="margin-top: 15px;"></div>
        <div style="margin-top: 15px;">
            <select id="tableRouteFilter" onchange="renderCustTable()"></select>
            <div id="custTableContainer" style="overflow-x:auto; margin-top:10px;">
                <table style="width:100%; border-collapse:collapse; font-size:0.8rem;">
                    <thead id="custTableHead"></thead>
                    <tbody id="custTableBody"></tbody>
                </table>
            </div>
        </div>
        <button class="btn" onclick="closeModal('mgrModal')" style="margin-top:15px;">Close</button>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h3>✏️ Edit Customer</h3>
        <div id="editFields"></div>
        <button class="btn btn-primary" id="saveEditBtn">Save</button>
        <button class="btn" onclick="closeModal('editModal')">Cancel</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script>
    // Configuration
    const CONFIG = {
        GOOGLE_CLIENT_ID: '343809984671-b59be5om2i4lf0qu3lpvgasa5ac8elfs.apps.googleusercontent.com',
        SCOPES: 'https://www.googleapis.com/auth/drive.readonly',
        ROUTES_FOLDER_ID: '1f1hEt8DDGSWP2TDxwX1SsWsmaTmdGclr',
        WATER_PRODUCTS_FILE_ID: '13wQBhl-izIADfyHUpMeBYdF9DnvAxslX',
        COFFEE_PRODUCTS_FILE_ID: '1qE8UXyMXkx-A-TbirZaqgBUMMSUw-vxs'
    };

    let tokenClient = null;
    let accessToken = null;
    let globalCustomers = [];
    let csvHeaders = [];
    let availableRoutes = [];
    let productMap = { water: [], coffee: [] };
    let currentRouteStops = [];
    let map;

    // Google Auth
    function initAuth() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CONFIG.GOOGLE_CLIENT_ID,
            scope: CONFIG.SCOPES,
            callback: async (resp) => {
                if (resp.error) return alert("Auth failed");
                accessToken = resp.access_token;
                document.getElementById('loginPrompt')?.remove();
                await loadAllData();
            }
        });
        tokenClient.requestAccessToken();
    }

    async function loadFile(fileId) {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.text();
    }

    async function listRouteFiles() {
        let url = `https://www.googleapis.com/drive/v3/files?q='${CONFIG.ROUTES_FOLDER_ID}'+in+parents+and+mimeType='text/csv'&fields=files(id,name)`;
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
        const data = await res.json();
        return data.files || [];
    }

    // FIXED: Proper CSV parsing for products
    async function loadAllData() {
        try {
            // Load product files
            const waterRaw = await loadFile(CONFIG.WATER_PRODUCTS_FILE_ID);
            const coffeeRaw = await loadFile(CONFIG.COFFEE_PRODUCTS_FILE_ID);
            
            // Parse water - each line is a product, first column is product name
            const waterLines = waterRaw.split('\n').filter(l => l.trim() && !l.startsWith(','));
            productMap.water = [];
            for (let line of waterLines) {
                // Get first column (before comma) or whole line
                let product = line.split(',')[0]?.trim() || line.trim();
                // Skip empty or header-like lines
                if (product && product.length > 0 && !product.toLowerCase().includes('product') && product !== 'NOT DELIVERED') {
                    productMap.water.push(product);
                }
            }
            
            // Parse coffee similarly
            const coffeeLines = coffeeRaw.split('\n').filter(l => l.trim());
            productMap.coffee = [];
            for (let line of coffeeLines) {
                let product = line.split(',')[0]?.trim() || line.trim();
                if (product && product.length > 0 && !product.toLowerCase().includes('product') && !product.includes('NOT DELIVERED')) {
                    // Clean up extra quotes
                    product = product.replace(/^["']|["']$/g, '');
                    productMap.coffee.push(product);
                }
            }
            
            console.log('✅ Water products loaded:', productMap.water);
            console.log('✅ Coffee products loaded:', productMap.coffee);
            
            // Load route files
            const routeFiles = await listRouteFiles();
            availableRoutes = routeFiles.map(f => f.name);
            document.getElementById('routeDropdown').innerHTML = '<option>-- Select Route --</option>' + 
                availableRoutes.map(r => `<option>${r.replace('.csv', '')}</option>`).join('');
            document.getElementById('tableRouteFilter').innerHTML = '<option value="All">All Routes</option>' + 
                availableRoutes.map(r => `<option>${r.replace('.csv', '')}</option>`).join('');
            
            // Load customer data
            globalCustomers = [];
            csvHeaders = [];
            for (let file of routeFiles) {
                const csvText = await loadFile(file.id);
                const lines = csvText.split(/\r?\n/).filter(l => l.trim());
                if (lines.length < 2) continue;
                const headers = lines[0].split(',').map(h => h.trim());
                if (csvHeaders.length === 0) csvHeaders = headers;
                for (let i = 1; i < lines.length; i++) {
                    const vals = lines[i].split(',').map(v => v.trim());
                    let obj = { __route: file.name.replace('.csv', '') };
                    headers.forEach((h, idx) => obj[h] = vals[idx] || '');
                    globalCustomers.push(obj);
                }
            }
            
            alert(`✅ Loaded:\n📊 ${globalCustomers.length} customers\n🗺️ ${availableRoutes.length} routes\n💧 ${productMap.water.length} water products\n☕ ${productMap.coffee.length} coffee products`);
            renderCustTable();
            
        } catch (err) {
            console.error(err);
            alert("Error: " + err.message);
        }
    }

    function renderCustTable() {
        let filter = document.getElementById('tableRouteFilter')?.value || 'All';
        let filtered = filter === 'All' ? globalCustomers : globalCustomers.filter(c => c.__route === filter);
        let tbody = document.getElementById('custTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        filtered.slice(0, 100).forEach((cust, idx) => {
            let row = `<tr>`;
            csvHeaders.forEach(h => row += `<td>${cust[h] || ''}</td>`);
            row += `</tr>`;
            tbody.innerHTML += row;
        });
        let thead = document.getElementById('custTableHead');
        if (thead && csvHeaders.length) {
            thead.innerHTML = `<tr>${csvHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;
        }
    }

    function showProducts() {
        let container = document.getElementById('productPreview');
        container.innerHTML = `
            <h4>💧 Water Products (${productMap.water.length})</h4>
            <div class="product-list">${productMap.water.map(p => `<div class="product-item">• ${p}</div>`).join('') || '<em>No products loaded</em>'}</div>
            <h4>☕ Coffee Products (${productMap.coffee.length})</h4>
            <div class="product-list">${productMap.coffee.map(p => `<div class="product-item">• ${p}</div>`).join('') || '<em>No products loaded</em>'}</div>
        `;
    }

    // Map & Route
    function initMap() {
        map = L.map('map').setView([55.17, -118.79], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    document.getElementById('btnStartRoute').onclick = () => {
        let route = document.getElementById('routeDropdown').value;
        if (!route || route === '-- Select Route --') return alert("Select a route");
        currentRouteStops = globalCustomers.filter(c => c.__route === route);
        if (!currentRouteStops.length) return alert("No stops");
        let stopDiv = document.getElementById('stopList');
        stopDiv.innerHTML = currentRouteStops.map((s, i) => `
            <div class="route-stop-item" onclick="alert('Address: ${s['Address'] || 'N/A'}\nPhone: ${s['Phone'] || 'N/A'}')">
                <strong>${i+1}. ${s['Company'] || s['Customer Name'] || 'Stop'}</strong><br>
                <small>${s['Address'] || 'No address'}</small>
            </div>
        `).join('');
    };

    document.getElementById('btnManager').onclick = () => {
        renderCustTable();
        showProducts();
        document.getElementById('mgrModal').style.display = 'flex';
    };
    document.getElementById('btnRefresh').onclick = () => { if (accessToken) loadAllData(); else initAuth(); };

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Auto-start
    window.addEventListener('load', () => {
        initMap();
        // Show login overlay if needed
        if (!accessToken) {
            let loginDiv = document.createElement('div');
            loginDiv.id = 'loginPrompt';
            loginDiv.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:10000;';
            loginDiv.innerHTML = `<div style="background:white; padding:30px; border-radius:20px; text-align:center;"><h2>LogiFlow Drive</h2><button id="loginBtn" class="btn btn-primary" style="padding:10px 30px;">Sign in with Google</button></div>`;
            document.body.appendChild(loginDiv);
            document.getElementById('loginBtn').onclick = () => {
                loginDiv.remove();
                initAuth();
            };
        }
    });
</script>
</body>
</html>

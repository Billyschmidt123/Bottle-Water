function showToast(message, isError) {
    var toast = document.createElement('div');
    toast.className = 'toast-notification';
    if (isError) toast.classList.add('toast-error');
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 3000);
}

function updateOnlineStatus(connected) {
    var statusSpan = document.getElementById('onlineStatus');
    if (connected && accessToken && userEmail) {
        statusSpan.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Online Storage Active';
        statusSpan.className = 'online-status active';
    } else {
        statusSpan.innerHTML = '<i class="fas fa-cloud-download-alt"></i> Offline';
        statusSpan.className = 'online-status inactive';
    }
}

// ============================================================
// SIMPLE MANUAL OAUTH (No One Tap - More Reliable)
// ============================================================

// Function to start OAuth flow
function startGoogleOAuth() {
    showToast('Opening Google Sign-In window...', false);
    
    // OAuth2 endpoint
    var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
        'client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID) +
        '&redirect_uri=' + encodeURIComponent(window.location.origin + window.location.pathname) +
        '&response_type=token' +
        '&scope=' + encodeURIComponent('https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets') +
        '&include_granted_scopes=true' +
        '&prompt=consent';
    
    // Open popup window
    var popup = window.open(authUrl, 'googleOAuth', 'width=500,height=600,left=200,top=100');
    
    if (!popup) {
        showToast('Popup blocked! Please allow popups for this site.', true);
        return;
    }
    
    // Check for redirect
    var checkInterval = setInterval(function() {
        try {
            var popupUrl = popup.location.href;
            if (popupUrl.indexOf(window.location.origin) === 0 && popupUrl.indexOf('access_token=') !== -1) {
                // Extract token from URL
                var hashParams = {};
                var hash = popupUrl.split('#')[1];
                if (hash) {
                    hash.split('&').forEach(function(part) {
                        var eqIndex = part.indexOf('=');
                        if (eqIndex > -1) {
                            hashParams[part.substring(0, eqIndex)] = part.substring(eqIndex + 1);
                        }
                    });
                }
                
                if (hashParams.access_token) {
                    accessToken = hashParams.access_token;
                    // Try to get user email from token info
                    fetch('https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=' + accessToken)
                        .then(function(res) { return res.json(); })
                        .then(function(data) {
                            userEmail = data.email || 'user@example.com';
                            showToast('Connected: ' + userEmail, false);
                            updateOnlineStatus(true);
                            loadProductFile('Coffee.csv');
                            loadCustomersFromSheets();
                            if (typeof loadEnhancedCustomers === 'function') setTimeout(loadEnhancedCustomers, 1000);
                            if (typeof loadEnhancedProducts === 'function') setTimeout(loadEnhancedProducts, 1000);
                        })
                        .catch(function() {
                            userEmail = 'authenticated-user';
                            showToast('Connected successfully', false);
                            updateOnlineStatus(true);
                            loadProductFile('Coffee.csv');
                            loadCustomersFromSheets();
                        });
                    
                    popup.close();
                    clearInterval(checkInterval);
                }
            } else if (popupUrl.indexOf('error=') !== -1) {
                showToast('Authentication failed', true);
                popup.close();
                clearInterval(checkInterval);
            }
        } catch(e) {
            // Cross-origin error - normal until popup redirects to same origin
        }
        
        // Check if popup closed
        if (popup.closed) {
            clearInterval(checkInterval);
            if (!accessToken) {
                showToast('Sign-in cancelled or failed', true);
            }
        }
    }, 500);
}

// Also keep the GSI method as fallback but with different approach
function initGoogleSignInFallback() {
    // Load GSI script dynamically
    var script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.async = true;
    script.defer = true;
    script.onload = function() {
        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: function(response) {
                var payload = JSON.parse(atob(response.credential.split('.')[1]));
                userEmail = payload.email;
                
                var tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
                    callback: function(tokenResponse) {
                        if (tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            showToast('Connected: ' + userEmail, false);
                            updateOnlineStatus(true);
                            loadProductFile('Coffee.csv');
                            loadCustomersFromSheets();
                        }
                    }
                });
                tokenClient.requestAccessToken();
            }
        });
        google.accounts.id.prompt();
    };
    document.head.appendChild(script);
}

// ============================================================
async function fetchFromGitHub(path) {
    try {
        var response = await fetch(GITHUB_RAW + path + '?t=' + Date.now());
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return await response.text();
    } catch (e) {
        console.error('Failed to fetch ' + path, e);
        return null;
    }
}

function saveProductsToLocalStorage() {
    if (!currentProductFile) return;
    var data = {
        headers: currentProdHeaders,
        products: currentProdList,
        file: currentProductFile,
        timestamp: new Date().toISOString()
    };
    localStorage.setItem('logiflow_products_' + currentProductFile, JSON.stringify(data));
}

function loadProductsFromLocalStorage(fileName) {
    var saved = localStorage.getItem('logiflow_products_' + fileName);
    if (saved) {
        try {
            var data = JSON.parse(saved);
            if (data.products && data.products.length > 0 && data.headers) {
                currentProdHeaders = data.headers;
                currentProdList = data.products;
                currentProductFile = data.file;
                renderProdTable();
                showToast('Loaded from browser storage', false);
                return true;
            }
        } catch(e) {
            console.error('LocalStorage error:', e);
        }
    }
    return false;
}

async function loadProductFile(fileName) {
    currentProductFile = fileName;
    var tbody = document.getElementById('prodTableBody');
    var theadRow = document.getElementById('prodTableHead');
    
    if (loadProductsFromLocalStorage(fileName)) return;
    
    tbody.innerHTML = '<tr><td colspan="10">Loading products...</div>';
    
    try {
        var text = await fetchFromGitHub('Products/' + fileName);
        if (!text) throw new Error('File not found');
        
        var lines = text.split('\n').filter(function(l) { return l.trim(); });
        if (lines.length > 0) {
            currentProdHeaders = lines[0].split(',').map(function(h) { return h.trim(); }).filter(function(h) { return h !== ''; });
            if (currentProdHeaders.indexOf('Status') === -1) currentProdHeaders.push('Status');
            
            var headerHtml = '<th>Action</th>';
            for (var h = 0; h < currentProdHeaders.length; h++) {
                headerHtml += '<th>' + currentProdHeaders[h] + '</th>';
            }
            theadRow.innerHTML = headerHtml;
            
            currentProdList = [];
            for (var i = 1; i < lines.length; i++) {
                var vals = lines[i].split(',');
                var pObj = {};
                for (var j = 0; j < currentProdHeaders.length; j++) {
                    var header = currentProdHeaders[j];
                    if (header !== 'Status') {
                        pObj[header] = (vals[j] || '').trim();
                    }
                }
                pObj.Status = pObj.Status || 'Active';
                var firstHeader = currentProdHeaders[0];
                if (pObj[firstHeader] && pObj[firstHeader] !== '' && pObj[firstHeader].toLowerCase() !== 'not delivered') {
                    currentProdList.push(pObj);
                }
            }
            
            renderProdTable();
            saveProductsToLocalStorage();
            showToast('Loaded from GitHub', false);
        }
    } catch (e) {
        tbody.innerHTML = '<tr><td colspan="10">Unable to load products.</div>';
        showToast('Error loading products', true);
    }
}

function renderProdTable() {
    var tbody = document.getElementById('prodTableBody');
    tbody.innerHTML = '';
    for (var idx = 0; idx < currentProdList.length; idx++) {
        var pObj = currentProdList[idx];
        var isDeactivated = (pObj.Status === 'Deactivated');
        var tr = document.createElement('tr');
        if (isDeactivated) tr.className = 'deactivated-row';
        tr.innerHTML = '<td><button class="btn-top" style="padding:4px; margin:2px; background:#28a745;" onclick="openProductEditModal(' + idx + ')">Edit</button><button class="btn-top" style="padding:4px; margin:2px; background:#ffc107;" onclick="toggleProductStatus(' + idx + ')">' + (pObj.Status === 'Active' ? 'Deactivate' : 'Activate') + '</button></td>';
        for (var h = 0; h < currentProdHeaders.length; h++) {
            tr.innerHTML += '<td>' + (pObj[currentProdHeaders[h]] || '') + '</td>';
        }
        tbody.appendChild(tr);
    }
}

window.toggleProductStatus = function(idx) {
    currentProdList[idx].Status = (currentProdList[idx].Status === 'Active') ? 'Deactivated' : 'Active';
    renderProdTable();
    saveProductsToLocalStorage();
};

window.openProductEditModal = function(idx) {
    currentEditingProductIndex = idx;

    container.innerHTML = '';
    for (var i = 0; i < currentProdHeaders.length; i++) {

    if (currentEditingProductIndex === -1) {
        alert('No product selected');
        return;
    }
    for (var i = 0; i < currentProdHeaders.length; i++) {
        var header = currentProdHeaders[i];
        if (header === 'Status') continue;
        var input = document.getElementById('product_edit_' + header.replace(/ /g, '_'));

    }
};

// SAVE PDF TO GOOGLE DRIVE
// ============================================================
async function savePDFToDrive(fileName, dataUrl) {
    if (!accessToken) {
        showToast('Please sign in with Google first', true);
        return false;
    }
    
    try {
        var base64Content = dataUrl;
        if (dataUrl.indexOf(',') !== -1) {
            base64Content = dataUrl.split(',')[1];
        }
        
        var binaryString = atob(base64Content);
        var bytes = new Uint8Array(binaryString.length);
        for (var i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        var blob = new Blob([bytes], { type: 'application/pdf' });
        
        var formData = new FormData();
        var metadata = {
            name: fileName,
            mimeType: 'application/pdf',
            parents: [GOOGLE_DRIVE_FOLDER_ID]
        };
        formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        formData.append('file', blob, fileName);
        
        var response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken },
            body: formData
        });
        
        if (response.ok) {
            showToast('PDF saved to Drive', false);
            return true;
        } else {
            showToast('Failed to save PDF', true);
            return false;
        }
    } catch (err) {
        console.error('Drive save error:', err);
        showToast('Error saving to Drive', true);
        return false;
    }
}

// ============================================================
async function appendToGoogleSheets(rowData) {
    if (!accessToken) {
        showToast('Please sign in first', true);
        return false;
    }
    
    try {
        var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + GOOGLE_SHEET_ID + '/values/TripLog!A:G:append?valueInputOption=USER_ENTERED';
        var response = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + accessToken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ values: [rowData] })
        });
        
        if (response.ok) return true;
        return false;
    } catch (err) {
        console.error('Sheets error:', err);
        return false;
    }
}

window.activateSignatureBox = function() {
    var canvas = document.getElementById('sig-canvas');
    var ctx = canvas.getContext('2d');
    canvas.style.pointerEvents = 'auto';
    canvas.style.opacity = '1';
    canvas.style.background = '#fff';
    document.getElementById('btnActivateSig').style.background = '#28a745';
    document.getElementById('btnActivateSig').textContent = 'READY TO SIGN';
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    isSigBlank = true;
    
    var drawing = false;
    canvas.onmousedown = function() { drawing = true; ctx.beginPath(); isSigBlank = false; };
    canvas.onmouseup = function() { drawing = false; };
    canvas.onmousemove = function(e) {
        if (!drawing) return;
        var rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    };
};

window.clearSignatureCanvas = function() {
    var canvas = document.getElementById('sig-canvas');
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    isSigBlank = true;
};

        var url = `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SHEET_ID}/values/Customers!A1:Z`;
        var response = await fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } });
        if (!response.ok) throw new Error('Failed');
        var data = await response.json();
        var values = data.values;
        if (!values || values.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10">No data found</div>';
            return;
        }
        var headers = values[0];
        var headerHtml = '<th>Action</th>';
        for (var h = 0; h < headers.length; h++) headerHtml += '<th>' + headers[h] + '</th>';
        thead.innerHTML = headerHtml;
        tbody.innerHTML = '';
        for (var i = 1; i < values.length; i++) {
            var row = values[i];
            var rowHtml = '<tr>';
            rowHtml += '<td><button class="btn-top" style="padding:4px;" onclick="alert(\'Edit\')">Edit</button></td>';
            for (var j = 0; j < headers.length && j < row.length; j++) rowHtml += '<td>' + (row[j] || '') + '</td>';
            rowHtml += '</tr>';
            tbody.innerHTML += rowHtml;
        }
        showToast('Loaded customers', false);
    } catch (err) {
        tbody.innerHTML = '<td><td colspan="10">Error loading customers</div>';
    }
}

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
    showPinModal();
    loadGitHubRoutes();
    
    var map = L.map('map').setView([55.17, -118.79], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    document.getElementById('btnManager').onclick = function() {
        document.getElementById('mgrModal').style.display = 'flex';
        if (accessToken) loadCustomersFromSheets();
        else showToast('Please sign in first', true);
    };
    document.getElementById('btnShowCust').onclick = function() {
        document.getElementById('custView').style.display = 'block';
        document.getElementById('prodView').style.display = 'none';
        if (accessToken) loadCustomersFromSheets();
        else showToast('Please sign in first', true);
    };
    document.getElementById('btnShowProd').onclick = function() {
        document.getElementById('custView').style.display = 'none';
        document.getElementById('prodView').style.display = 'block';
        if (accessToken) loadProductFile('Coffee.csv');
        else showToast('Please sign in first', true);
    };
    document.getElementById('btnForceRefresh').onclick = function() {
        loadGitHubRoutes();
        if (accessToken) loadCustomersFromSheets();
    };
}

init();
</script>

<!-- ========== ADDITIVE FIX: Live View Functionality (Fixed) ========== -->
<style>
.live-view-modal {
    max-width: 1200px !important;
    width: 95% !important;
}
.live-view-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}
.live-view-table th, .live-view-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
}
.live-view-table th {
    background: #004a99;
    color: white;
    position: sticky;
    top: 0;
    cursor: pointer;
}
.live-view-table tr:nth-child(even) {
    background: #f9f9f9;
}
.live-view-table tr:hover {
    background: #e7f3ff;
}
.live-view-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    align-items: center;
    flex-wrap: wrap;
}
.date-picker-input {
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
}
.refresh-btn {
    background: #17a2b8;
}
.refresh-btn:hover {
    background: #138496;
}
.auto-refresh-checkbox {
    margin-left: 15px;
    display: flex;
    align-items: center;
    gap: 5px;
}
.live-view-summary {
    background: #e9ecef;
    padding: 8px 12px;
    border-radius: 4px;
    margin-bottom: 10px;
    font-size: 13px;
}
.loading-spinner-small {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #f3f3f3;
    border-top: 2px solid #004a99;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<script>
(function fixLiveView() {
    // Live View state
    var liveViewModal = null;
    var autoRefreshInterval = null;
    
    // Helper to get global token from window or check periodically
    function getAccessToken() {
        // Try to get from window if exposed
        if (typeof window.accessToken !== 'undefined' && window.accessToken) {
            return window.accessToken;
        }
        // Try to get from the main scope via the token client
        if (typeof accessToken !== 'undefined' && accessToken) {
            return accessToken;
        }
        return null;
    }
    
    function getDriveFolderId() {
        // Try to get from window
        if (typeof window.GOOGLE_DRIVE_FOLDER_ID !== 'undefined') {
            return window.GOOGLE_DRIVE_FOLDER_ID;
        }
        // Use the hardcoded value from configuration
        return '1AimlacYfkEfD-g-Y1c2wghgS1o3aktxk';
    }
    
    function getRepoOwner() {
        if (typeof window.REPO_OWNER !== 'undefined') return window.REPO_OWNER;
        return 'Billyschmidt123';
    }
    
    function getRepoName() {
        if (typeof window.REPO_NAME !== 'undefined') return window.REPO_NAME;
        return 'Bottle-Water';
    }
    
    // Override the managerLiveView function
    window.managerLiveView = function() {
        openLiveViewModal();
    };
    
    // Create and open the Live View modal
    function openLiveViewModal() {
        // Remove existing modal if present
        if (liveViewModal) {
            liveViewModal.remove();
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }
        
        // Create modal
        liveViewModal = document.createElement('div');
        liveViewModal.id = 'liveViewModal';
        liveViewModal.className = 'modal-overlay';
        liveViewModal.style.display = 'flex';
        liveViewModal.innerHTML = `
            <div class="modal-content live-view-modal">
                <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="margin:0;">Live View - Trip Logs</h2>
                    <button onclick="closeLiveViewModal()" class="btn-top" style="background:#dc3545;">Close</button>
                </div>
                <hr>
                <div class="live-view-controls">
                    <input type="date" id="liveViewDatePicker" class="date-picker-input" value="${getTodayDate()}">
                    <button id="liveViewSearchBtn" class="btn-top">Search Trip Logs</button>
                    <button id="liveViewRefreshBtn" class="btn-top refresh-btn">Refresh</button>
                    <label class="auto-refresh-checkbox">
                        <input type="checkbox" id="autoRefreshCheckbox"> Auto-refresh (30 sec)
                    </label>
                    <span id="liveViewStatus" style="margin-left: auto; font-size:12px; color:#666;"></span>
                </div>
                <div id="liveViewSummary" class="live-view-summary">
                    📅 Select a date and click "Search Trip Logs" to view delivery records...
                </div>
                <div style="overflow-x: auto; max-height: 60vh; overflow-y: auto;">
                    <table id="liveViewTable" class="live-view-table">
                        <thead id="liveViewTableHead">
                            <tr><th>No data</th></tr>
                        </thead>
                        <tbody id="liveViewTableBody">
                            <tr><td style="text-align:center;">Select a date to search</td></tr>
                        </tbody>
                    能有
                </div>
            </div>
        `;
        document.body.appendChild(liveViewModal);
        
        // Set up event listeners
        document.getElementById('liveViewSearchBtn').onclick = function() {
            searchTripLogs();
        };
        document.getElementById('liveViewRefreshBtn').onclick = function() {
            searchTripLogs();
        };
        document.getElementById('autoRefreshCheckbox').onchange = function(e) {
            if (e.target.checked) {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);
                autoRefreshInterval = setInterval(function() {
                    searchTripLogs(true);
                }, 30000);
                showLiveViewToast('Auto-refresh enabled (30 sec)', false);
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                    showLiveViewToast('Auto-refresh disabled', false);
                }
            }
        };
    }
    
    // Close Live View modal
    window.closeLiveViewModal = function() {
        if (liveViewModal) {
            liveViewModal.remove();
            liveViewModal = null;
        }
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
    };
    
    // Get today's date in YYYY-MM-DD format
    function getTodayDate() {
        var today = new Date();
        var year = today.getFullYear();
        var month = String(today.getMonth() + 1).padStart(2, '0');
        var day = String(today.getDate()).padStart(2, '0');
        return year + '-' + month + '-' + day;
    }
    
    // Show toast message within Live View
    function showLiveViewToast(message, isError) {
        var statusSpan = document.getElementById('liveViewStatus');
        if (statusSpan) {
            statusSpan.innerHTML = message;
            statusSpan.style.color = isError ? '#dc3545' : '#28a745';
            setTimeout(function() {
                if (statusSpan) statusSpan.innerHTML = '';
            }, 3000);
        }
    }
    
    // Search trip logs - First try Google Drive, then fallback to GitHub
    async function searchTripLogs(isAutoRefresh) {
        var datePicker = document.getElementById('liveViewDatePicker');
        if (!datePicker) return;
        
        var selectedDate = datePicker.value;
        if (!selectedDate) {
            showLiveViewToast('Please select a date', true);
            return;
        }
        
        // Show loading indicator
        var summaryDiv = document.getElementById('liveViewSummary');
        var tableBody = document.getElementById('liveViewTableBody');
        if (summaryDiv) {
            summaryDiv.innerHTML = '<span class="loading-spinner-small"></span> Searching for trip logs on ' + selectedDate + '...';
        }
        if (tableBody) {
            tableBody.innerHTML = '<tr><td style="text-align:center;"><span class="loading-spinner-small"></span> Loading...</td></tr>';
        }
        
        var token = getAccessToken();
        var driveFolderId = getDriveFolderId();
        var repoOwner = getRepoOwner();
        var repoName = getRepoName();
        
        // Format date for filename search (YYYY-MM-DD)
        var dateStr = selectedDate;
        
        // Try GitHub first (more reliable, no CORS)
        try {
            var githubUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/trip-reports`;
            var githubResponse = await fetch(githubUrl);
            
            if (githubResponse.ok) {
                var files = await githubResponse.json();
                var matchingFiles = [];
                
                for (var i = 0; i < files.length; i++) {
                    var file = files[i];
                    if (file.name.endsWith('.csv') && file.name.indexOf(dateStr) !== -1) {
                        matchingFiles.push({
                            name: file.name,
                            download_url: file.download_url,
                            modified: new Date(file.commit?.committer?.date || Date.now()).toLocaleString()
                        });
                    }
                }
                
                if (matchingFiles.length === 0) {
                    summaryDiv.innerHTML = `📭 No trip logs found for ${selectedDate} in GitHub.<br>Complete a delivery to create a log file.`;
                    tableBody.innerHTML = '<tr><td style="text-align:center; color:#999;">No trip logs found for this date</td></tr>';
                    return;
                }
                
                displayFileList(matchingFiles, summaryDiv);
                
                // Auto-load first file
                if (!isAutoRefresh && matchingFiles.length > 0) {
                    loadTripLogFromUrl(matchingFiles[0].download_url, matchingFiles[0].name);
                }
                return;
            }
        } catch (githubErr) {
            console.warn('GitHub fetch failed:', githubErr);
        }
        
        // Fallback to Google Drive if GitHub fails and user is signed in
        if (!token) {
            summaryDiv.innerHTML = '⚠️ Please sign in with Google to view trip logs.<br>Click the "Sign in with Google" button in the header, then try again.';
            tableBody.innerHTML = '<tr><td style="text-align:center; color:#dc3545;">Not signed in. Please sign in with Google.</td></tr>';
            return;
        }
        
        try {
            var query = `name contains 'Trip-log' and name contains '${dateStr}' and trashed = false`;
            var searchUrl = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name,createdTime,modifiedTime)&orderBy=modifiedTime desc`;
            
            var searchResponse = await fetch(searchUrl, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            
            if (!searchResponse.ok) {
                throw new Error('Google Drive API error: ' + searchResponse.status);
            }
            
            var searchResult = await searchResponse.json();
            var files = searchResult.files || [];
            
            if (files.length === 0) {
                summaryDiv.innerHTML = `📭 No trip logs found for ${selectedDate} in Google Drive.<br>Complete a delivery to create a log file.`;
                tableBody.innerHTML = '<tr><td style="text-align:center; color:#999;">No trip logs found for this date</td></tr>';
                return;
            }
            
            var fileList = files.map(function(f) {
                return {
                    name: f.name,
                    id: f.id,
                    modified: f.modifiedTime ? new Date(f.modifiedTime).toLocaleString() : 'Unknown'
                };
            });
            
            displayFileList(fileList, summaryDiv);
            
            if (!isAutoRefresh && files.length > 0) {
                loadTripLogFromDrive(files[0].id, files[0].name);
            }
            
        } catch (err) {
            console.error('Search error:', err);
            summaryDiv.innerHTML = '❌ Error searching: ' + err.message + '<br>Make sure you are signed in with Google.';
            tableBody.innerHTML = '<tr><td style="text-align:center; color:#dc3545;">Error loading data: ' + err.message + '</td></tr>';
        }
    }
    
    function displayFileList(files, summaryDiv) {
        var fileListHtml = '<div style="margin-bottom:15px;">';
        fileListHtml += '<strong>📁 Found ' + files.length + ' trip log(s):</strong>';
        fileListHtml += '<table style="width:100%; border-collapse:collapse; margin-top:10px;">';
        fileListHtml += '<tr style="background:#e9ecef;"><th style="padding:8px;">File Name</th><th style="padding:8px;">Modified</th><th style="padding:8px;">Action</th></tr>';
        
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            fileListHtml += `
                <tr>
                    <td style="padding:8px; border-bottom:1px solid #eee;">${file.name}</td>
                    <td style="padding:8px; border-bottom:1px solid #eee;">${file.modified}</td>
                    <td style="padding:8px; border-bottom:1px solid #eee;">
                        <button class="btn-top" style="padding:4px 8px;" onclick="loadTripLogFromUrlManual('${file.download_url || file.url || ''}', '${file.name}', '${file.id || ''}')">View Log</button>
                    </td>
                </tr>
            `;
        }
        fileListHtml += '</table></div><div id="tripLogContentDiv"></div>';
        summaryDiv.innerHTML = fileListHtml;
    }
    
    window.loadTripLogFromUrlManual = async function(url, fileName, fileId) {
        if (url) {
            loadTripLogFromUrl(url, fileName);
        } else if (fileId) {
            loadTripLogFromDrive(fileId, fileName);
        } else {
            showLiveViewToast('Cannot load file - no URL or ID', true);
        }
    };
    
    async function loadTripLogFromUrl(url, fileName) {
        var contentDiv = document.getElementById('tripLogContentDiv');
        if (!contentDiv) return;
        
        contentDiv.innerHTML = '<div style="text-align:center; padding:20px;"><span class="loading-spinner-small"></span> Loading ' + fileName + '...</div>';
        
        try {
            var response = await fetch(url + '?t=' + Date.now());
            if (!response.ok) throw new Error('Failed to load');
            
            var csvText = await response.text();
            displayTripLogData(csvText, fileName, contentDiv);
            
        } catch (err) {
            contentDiv.innerHTML = '<div style="text-align:center; color:#dc3545;">Error loading file: ' + err.message + '</div>';
        }
    }
    
    async function loadTripLogFromDrive(fileId, fileName) {
        var contentDiv = document.getElementById('tripLogContentDiv');
        if (!contentDiv) return;
        
        var token = getAccessToken();
        if (!token) {
            contentDiv.innerHTML = '<div style="text-align:center; color:#dc3545;">Please sign in with Google first</div>';
            return;
        }
        
        contentDiv.innerHTML = '<div style="text-align:center; padding:20px;"><span class="loading-spinner-small"></span> Loading ' + fileName + '...</div>';
        
        try {
            var exportUrl = `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text%2Fplain`;
            var response = await fetch(exportUrl, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            
            if (!response.ok) throw new Error('Failed to load file');
            
            var csvText = await response.text();
            displayTripLogData(csvText, fileName, contentDiv);
            
        } catch (err) {
            contentDiv.innerHTML = '<div style="text-align:center; color:#dc3545;">Error loading file: ' + err.message + '</div>';
        }
    }
    
    function displayTripLogData(csvText, fileName, contentDiv) {
        var lines = csvText.split('\n').filter(function(l) { return l.trim(); });
        
        if (lines.length === 0) {
            contentDiv.innerHTML = '<div style="text-align:center; color:#999;">File is empty</div>';
            return;
        }
        
        var headers = lines[0].split(',').map(function(h) { return h.trim(); });
        var data = [];
        for (var i = 1; i < lines.length; i++) {
            var values = lines[i].split(',');
            var row = {};
            for (var j = 0; j < headers.length && j < values.length; j++) {
                row[headers[j]] = values[j].trim();
            }
            data.push(row);
        }
        
        var tableHtml = '<div style="margin-top:15px;"><h4>' + fileName + '</h4>';
        tableHtml += '<div style="overflow-x: auto; max-height: 400px; overflow-y: auto;">';
        tableHtml += '<table class="live-view-table" style="font-size:11px;">';
        
        tableHtml += '<thead><tr>';
        for (var h = 0; h < headers.length; h++) {
            tableHtml += '<th>' + headers[h] + '</th>';
        }
        tableHtml += '</thead><tbody>';
        
        for (var r = 0; r < data.length; r++) {
            tableHtml += '<tr>';
            for (var h = 0; h < headers.length; h++) {
                var cellValue = data[r][headers[h]] || '';
                if (headers[h] === 'Status') {
                    var statusStyle = cellValue === 'Delivered' ? 'style="color:#28a745; font-weight:bold;"' : (cellValue === 'Not Delivered' ? 'style="color:#dc3545; font-weight:bold;"' : '');
                    tableHtml += '<td ' + (statusStyle || '') + '>' + cellValue + '</td>';
                } else {
                    tableHtml += '<td>' + cellValue + '</td>';
                }
            }
            tableHtml += '</tr>';
        }
        
        tableHtml += '</tbody></table></div>';
        tableHtml += '<div style="margin-top:10px; font-size:11px; color:#666;">📊 Total records: ' + data.length + '</div>';
        tableHtml += '<button class="btn-top" style="margin-top:10px; background:#6c757d;" onclick="document.getElementById(\'tripLogContentDiv\').innerHTML = \'\'">Clear View</button>';
        tableHtml += '</div>';
        
        contentDiv.innerHTML = tableHtml;
        showLiveViewToast('Loaded ' + fileName + ' - ' + data.length + ' records', false);
    }
    
    console.log('Live View fix applied - searches GitHub trip-reports folder');
})();
</script>
<!-- ========== END OF ADDITIVE FIX ========== -->
